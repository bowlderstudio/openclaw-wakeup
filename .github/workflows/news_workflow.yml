steps:
  - name: Debug API call
    env:
      TOKEN: ${{ secrets.OPENCLAW_API_TOKEN }}
    run: |
      echo "=== 调试信息 ==="
      echo "Token前10位: ${TOKEN:0:10}..."
      echo "当前时间: $(date -u)"
      
      # 发送最简单的测试消息
      RESPONSE=$(curl -v -X POST "https://openclaw-min.fly.dev/tools/invoke" \
        -H "Authorization: Bearer $TOKEN" \
        -H "Content-Type: application/json" \
        -d '{
          "tool": "message",
          "args": {
            "action": "send",
            "to": "8604429591",
            "message": "TEST",
            "channel": "telegram"
          }
        }' 2>&1)
      
      echo "=== curl输出 ==="
      echo "$RESPONSE"
      
      # 提取HTTP状态码
      HTTP_CODE=$(echo "$RESPONSE" | grep -o "HTTP/[0-9.]* [0-9]*" | tail -1 | awk '{print $2}')
      echo "HTTP状态码: $HTTP_CODE"
      
      # 提取JSON响应
      JSON_RESPONSE=$(echo "$RESPONSE" | grep -A 100 "^{" | head -50)
      echo "JSON响应: $JSON_RESPONSE"
