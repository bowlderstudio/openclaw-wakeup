name: Stop OpenClaw Server

on:
  workflow_dispatch:

jobs:
  stop:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Install Fly CLI
      - name: Install Fly CLI
        run: |
          curl -L https://fly.io/install.sh | sh
          export FLYCTL_INSTALL="/home/runner/.fly"
          export PATH="$FLYCTL_INSTALL/bin:$PATH"

          # 验证是否成功
          flyctl version

      # 2️⃣ Stop Fly machine
      - name: Stop Fly machine
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          export FLYCTL_INSTALL="/home/runner/.fly"
          export PATH="$FLYCTL_INSTALL/bin:$PATH"

          echo "Listing machines..."
          flyctl machines list --app openclaw-min

          echo "Stopping all machines..."

          for id in $(flyctl machines list --app openclaw-min --json | jq -r '.[].id'); do
            echo "Stopping machine $id"
            flyctl machines stop $id --app openclaw-min
          done

          echo "Done."
