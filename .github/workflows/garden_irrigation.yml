name: Garden Irrigation
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  irrigate:
    runs-on: ubuntu-latest

    steps:
      - name: Warm up OpenClaw
        run: |
          for i in 1 2 3
          do
            echo "Wake attempt $i..."
            curl -s -o /dev/null -w "%{http_code}\n" https://openclaw-min.fly.dev/
            
            if [ $i -lt 3 ]; then
              echo "Sleeping 1.5 minutes..."
              sleep 1
            fi
          done

      - name: Call garden-irrigation skill
        env:
          TOKEN: ${{ secrets.OPENCLAW_API_TOKEN }}
        run: |
          echo "Starting garden irrigation..."

          RESULT=$(curl -s -X POST "https://openclaw-min.fly.dev/tools/invoke" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d '{
              "tool": "agent",
              "args": {
                "agent": "garden_manager",
                "skill": "garden-irrigation"
              }
            }')

          echo "Response: $RESULT"
          echo "Garden irrigation done"
