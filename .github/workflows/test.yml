name: Daily AI News Simple Tavily
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
    - name: Send AI news
      env:
        TOKEN: ${{ secrets.OPENCLAW_API_TOKEN }}
      run: |
        # Simple Tavily search and send
        SEARCH_RESULT=$(curl -s -X POST "https://openclaw-min.fly.dev/tools/invoke" \
          -H "Authorization: Bearer $TOKEN" \
          -H "Content-Type: application/json" \
          -d '{
            "tool": "tavily_search",
            "args": {
              "query": "latest AI news 2026",
              "max_results": 3,
              "include_answer": true,
              "search_depth": "advanced"
            }
          }')
        
        # Extract answer and first result
        ANSWER=$(echo "$SEARCH_RESULT" | jq -r '.result.answer // ""' | sed 's/<<<[^>]*>>>//g')
        FIRST_TITLE=$(echo "$SEARCH_RESULT" | jq -r '.result.results[0].title // ""' | sed 's/<<<[^>]*>>>//g')
        FIRST_URL=$(echo "$SEARCH_RESULT" | jq -r '.result.results[0].url // ""')
        
        # Create message
        MESSAGE="📰 AI News Update\\n\\n"
        MESSAGE+="Summary: $ANSWER\\n\\n"
        MESSAGE+="Top story: $FIRST_TITLE\\n"
        MESSAGE+="Read more: $FIRST_URL\\n\\n"
        MESSAGE+="Source: Tavily Search"
        
        # Send to Telegram
        jq -n \
          --arg tool "message" \
          --arg action "send" \
          --arg to "8604429591" \
          --arg channel "telegram" \
          --arg message "$MESSAGE" \
          '{
            "tool": $tool,
            "args": {
              "action": $action,
              "to": $to,
              "channel": $channel,
              "message": $message
            }
          }' | curl -X POST "https://openclaw-min.fly.dev/tools/invoke" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d @-
        
        echo "AI news sent with Tavily"
