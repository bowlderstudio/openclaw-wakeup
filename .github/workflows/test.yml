name: Daily AI News with Tavily
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
    - name: Send AI news
      env:
        TOKEN: ${{ secrets.OPENCLAW_API_TOKEN }}
      run: |
        echo "开始AI新闻任务..."
        
        # Get Tavily search results
        SEARCH_RESULT=$(curl -s -X POST "https://openclaw-min.fly.dev/tools/invoke" \
          -H "Authorization: Bearer $TOKEN" \
          -H "Content-Type: application/json" \
          -d '{
            "tool": "tavily_search",
            "args": {
              "query": "latest AI news 2026",
              "max_results": 3,
              "include_answer": true,
              "search_depth": "advanced"
            }
          }')
        
        echo "Response received"
        
        # Extract the JSON string from .result.content[0].text
        TAVILY_JSON=$(echo "$SEARCH_RESULT" | jq -r '.result.content[0].text' 2>/dev/null || echo "{}")
        
        echo "Tavily JSON length: ${#TAVILY_JSON}"
        
        # Parse the Tavily JSON
        ANSWER=$(echo "$TAVILY_JSON" | jq -r '.answer // ""' 2>/dev/null || echo "")
        echo "Answer length: ${#ANSWER}"
        
        # Clean the answer
        if [ -n "$ANSWER" ] && [ "$ANSWER" != "null" ]; then
          CLEAN_ANSWER=$(echo "$ANSWER" | sed 's/<<<EXTERNAL_UNTRUSTED_CONTENT[^>]*>>>//g' | sed 's/END_EXTERNAL_UNTRUSTED_CONTENT//g' | sed 's/Source: Web Search---//g' | tr -d '\n' | sed 's/  */ /g' | cut -c 1-300)
          echo "Cleaned answer: $CLEAN_ANSWER"
        else
          CLEAN_ANSWER="AMD unveiled advanced AI PC chips at CES 2026. AI trends include intelligent systems with enhanced context windows."
          echo "Using fallback answer"
        fi
        
        # Get first result
        FIRST_TITLE=$(echo "$TAVILY_JSON" | jq -r '.results[0].title // ""' 2>/dev/null || echo "")
        FIRST_URL=$(echo "$TAVILY_JSON" | jq -r '.results[0].url // ""' 2>/dev/null || echo "")
        
        echo "First title: $FIRST_TITLE"
        echo "First URL: $FIRST_URL"
        
        if [ -n "$FIRST_TITLE" ] && [ "$FIRST_TITLE" != "null" ]; then
          CLEAN_TITLE=$(echo "$FIRST_TITLE" | sed 's/<<<EXTERNAL_UNTRUSTED_CONTENT[^>]*>>>//g' | sed 's/END_EXTERNAL_UNTRUSTED_CONTENT//g' | sed 's/Source: Web Search---//g' | tr -d '\n' | sed 's/  */ /g')
        else
          CLEAN_TITLE="What's next for AI in 2026"
          FIRST_URL="https://www.technologyreview.com/2026/01/05/1130662/whats-next-for-ai-in-2026/"
        fi
        
        # Create message
        MESSAGE="📰 **AI News Update**\\n\\n"
        MESSAGE+="**Summary:** $CLEAN_ANSWER\\n\\n"
        MESSAGE+="**Top Story:** $CLEAN_TITLE\\n"
        MESSAGE+="**Read more:** $FIRST_URL\\n\\n"
        MESSAGE+="_Source: Tavily Search • $(date -u +'%Y-%m-%d %H:%M UTC')_"
        
        echo "Final message created"
        
        # Send to Telegram - CORRECT DOMAIN
        TELEGRAM_JSON=$(jq -n \
          --arg tool "message" \
          --arg action "send" \
          --arg to "8604429591" \
          --arg channel "telegram" \
          --arg message "$MESSAGE" \
          '{
            "tool": $tool,
            "args": {
              "action": $action,
              "to": $to,
              "channel": $channel,
              "message": $message
            }
          }')
        
        echo "Sending to Telegram (openclaw-min.fly.dev)..."
        
        curl -X POST "https://openclaw-min.fly.dev/tools/invoke" \
          -H "Authorization: Bearer $TOKEN" \
          -H "Content-Type: application/json" \
          -d "$TELEGRAM_JSON"
        
        echo "任务完成"
