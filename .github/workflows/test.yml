name: Daily AI News
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
    - name: Send AI news
      env:
        TOKEN: ${{ secrets.OPENCLAW_API_TOKEN }}
      run: |
        echo "开始AI新闻任务..."
        
        # Get AI news
        RAW_RESPONSE=$(curl -s -X POST "https://openclaw-min.fly.dev/tools/invoke" \
          -H "Authorization: Bearer $TOKEN" \
          -H "Content-Type: application/json" \
          -d '{
            "tool": "web_search",
            "args": {
              "query": "AI news today with source URLs",
              "count": 3
            }
          }')
        
        # Extract content using jq
        CONTENT=$(echo "$RAW_RESPONSE" | jq -r '.result.content[0].text // ""')
        
        # Prepare message - clean up
        if [ -n "$CONTENT" ] && [ "$CONTENT" != "null" ]; then
          # Remove EXTERNAL_UNTRUSTED_CONTENT tags
          CLEAN=$(echo "$CONTENT" | sed 's/<<<EXTERNAL_UNTRUSTED_CONTENT[^>]*>>>//g')
          # Limit length for Telegram
          TRUNCATED=$(echo "$CLEAN" | head -c 3000)
          MESSAGE="📰 AI News\n\n$TRUNCATED"
        else
          MESSAGE="📰 AI News\n\nLatest AI developments today. Check tech news sites for detailed updates."
        fi
        
        echo "Message length: ${#MESSAGE}"
        
        # Send to Telegram using jq to properly encode JSON
        TELEGRAM_JSON=$(jq -n \
          --arg tool "message" \
          --arg action "send" \
          --arg to "8604429591" \
          --arg channel "telegram" \
          --arg message "$MESSAGE" \
          '{
            "tool": $tool,
            "args": {
              "action": $action,
              "to": $to,
              "channel": $channel,
              "message": $message
            }
          }')
        
        echo "Sending JSON:"
        echo "$TELEGRAM_JSON" | jq .
        
        curl -X POST "https://openclaw-min.fly.dev/tools/invoke" \
          -H "Authorization: Bearer $TOKEN" \
          -H "Content-Type: application/json" \
          -d "$TELEGRAM_JSON"
        
        echo "任务完成"
