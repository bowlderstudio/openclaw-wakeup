name: Test JSON Encoding
on: workflow_dispatch

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Test simple message
      env:
        TOKEN: ${{ secrets.OPENCLAW_API_TOKEN }}
      run: |
        # Test with a simple message first
        jq -n \
          --arg tool "message" \
          --arg action "send" \
          --arg to "8604429591" \
          --arg channel "telegram" \
          --arg message "Test message from GitHub Actions $(date)" \
          '{
            "tool": $tool,
            "args": {
              "action": $action,
              "to": $to,
              "channel": $channel,
              "message": $message
            }
          }' | curl -X POST "https://openclaw-min.fly.dev/tools/invoke" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d @-
        
        echo "Test message sent"
