name: Daily AI News - Top 5
on:
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    
    steps:
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Debug RAW_RESULT
        env:
          TOKEN: ${{ secrets.OPENCLAW_API_TOKEN }}
        run: |
          RAW_RESULT=$(curl -s -X POST "https://openclaw-min.fly.dev/tools/invoke" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d '{
              "tool": "tavily_search",
              "args": {
                "query": "latest AI developments",
                "max_results": 5,
                "include_answer": "advanced",
                "topic": "news",
                "search_depth": "advanced",
                "time_range": "day"
              }
            }')
          
          echo "=== RAW_RESULT ==="
          echo "$RAW_RESULT" | jq . || echo "$RAW_RESULT"
