name: Daily AI News
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
      
      - name: Send AI news
        env:
          TOKEN: ${{ secrets.OPENCLAW_API_TOKEN }}
        run: |
          echo "开始AI新闻任务..."
          
          # 获取AI新闻
          response=$(curl -s -X POST "https://openclaw-min.fly.dev/tools/invoke" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d '{
              "tool": "web_search",
              "args": {
                "query": "AI news today",
                "count": 3
              }
            }')
          
          # 提取内容
          content=$(echo "$response" | jq -r '.result.content[0].text' 2>/dev/null || echo "")
          
          if [ -n "$content" ]; then
            actual=$(echo "$content" | jq -r '.content' 2>/dev/null || echo "$content")
            clean=$(echo "$actual" | sed 's/<<<EXTERNAL_UNTRUSTED_CONTENT[^>]*>>>//g')
            message="📰 AI News\n\n$clean"
          else
            message="📰 AI News\n\nContent unavailable"
          fi
          
          # 发送
          curl -X POST "https://openclaw-min.fly.dev/tools/invoke" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d '{
              "tool": "message",
              "args": {
                "action": "send",
                "to": "8604429591",
                "message": "'"$(echo "$message" | sed 's/"/\\"/g' | sed 's/$/\\n/' | tr -d '\n')"'",
                "channel": "telegram"
              }
            }'
