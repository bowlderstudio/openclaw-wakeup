name: AI News Test
on: workflow_dispatch

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Send test message
        env:
          TOKEN: ${{ secrets.OPENCLAW_API_TOKEN }}
        run: |
          curl -X POST "https://openclaw-min.fly.dev/tools/invoke" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"tool":"message","args":{"action":"send","to":"8604429591","message":"Send me top 5 AI news.","channel":"telegram"}}'
